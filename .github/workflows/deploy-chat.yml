name: Deploy Chat UI → Vercel

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "web/chat/**"
      - ".github/workflows/deploy-chat.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Link / create Vercel project and deploy
        working-directory: web/chat
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Link to existing project or create new one called "redtonomous-chat"
          vercel link --yes --project=redtonomous-chat --token=$VERCEL_TOKEN 2>/dev/null || true
          # Install deps with legacy peer deps (needed for Excalidraw)
          npm install --legacy-peer-deps
          # Deploy to production
          vercel deploy --prod --yes --token=$VERCEL_TOKEN
